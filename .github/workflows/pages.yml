name: Verify and deploy SwiftMessengerLab

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-verify:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Test Foundation core
        run: make test
      - name: Verify compiler microscope
        run: make compiler-test
      - name: Build for a generic iOS Simulator
        run: make build DESTINATION='generic/platform=iOS Simulator'

  showcase-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Audit public showcase
        run: make verify-showcase
      - name: Scan public boundary
        run: make public-scan

  package:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: [swift-verify, showcase-verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: docs

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: package
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
